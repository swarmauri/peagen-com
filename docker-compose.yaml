services:
  peagen-com:
    build: .
    container_name: peagen-com
    restart: unless-stopped
    labels:
      site.host: peagen.com
      site.kind: mdwrk-lander
    expose:
      - "80"
    networks:
      dockerwp:
        aliases:
          - peagen-com

networks:
  dockerwp:
    name: dockerwp
    external: true
