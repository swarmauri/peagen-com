---
apiVersion: npmctl.com/v1
schemaVersion: 2
dns_records:
  - provider: namecheap
    zone: peagen.com
    type: A
    name: "@"
    value: __SITE_SERVER_IP__
    ttl: 300
    meta:
      managed_by: npmctl
      owner: peagen-com
      resource_id: dns.peagen-com.root-a
  - provider: namecheap
    zone: peagen.com
    type: A
    name: "*"
    value: __SITE_SERVER_IP__
    ttl: 300
    meta:
      managed_by: npmctl
      owner: peagen-com
      resource_id: dns.peagen-com.wildcard-a
  - provider: namecheap
    zone: peagen.com
    type: CNAME
    name: "www"
    value: peagen.com
    ttl: 300
    meta:
      managed_by: npmctl
      owner: peagen-com
      resource_id: dns.peagen-com.www-cname
