---
apiVersion: npmctl.com/v1
schemaVersion: 2
certificates:
  - name: peagen-com-letsencrypt
    domain_names:
      - peagen.com
      - www.peagen.com
    certificate_type: letsencrypt
    api_payload:
      provider: letsencrypt
      meta:
        letsencrypt_email: "__NPM_IDENTITY__"
        letsencrypt_agree: true
        dns_challenge: false
        managed_by: npmctl
        owner: peagen-com
        resource_id: cert.peagen-com
    meta:
      managed_by: npmctl
      owner: peagen-com
      resource_id: cert.peagen-com
proxy_hosts:
  - domain_names:
      - peagen.com
      - www.peagen.com
    forward_scheme: http
    forward_host: peagen-com
    forward_port: 80
    certificate_ref: cert.peagen-com
    ssl_forced: 1
    http2_support: 1
    hsts_enabled: 1
    hsts_subdomains: 0
    allow_websocket_upgrade: 1
    block_exploits: 1
    meta:
      managed_by: npmctl
      owner: peagen-com
      resource_id: proxy.peagen-com