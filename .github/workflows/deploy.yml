name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-peagen-com
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: deployment
    env:
      NPM_BASE_URL: ${{ vars.NPM_BASE_URL || 'https://nginx.bz23.xyz/api' }}
      NPM_IDENTITY: jacob@groupsum.xyz
      NPM_SECRET: ${{ secrets.NPM_SECRET || secrets.NPM_PASSWORD || secrets.NGINX_PROXY_MANAGER_SECRET }}
      NPM_TIMEOUT_S: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install npmctl from PyPI
        run: python -m pip install --upgrade npmctl npmctl-namecheap
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Validate Docker proxy target
        run: npm run proxy:target-check
      - name: Validate npmctl proxy desired state
        run: npmctl validate desired-state/proxy.yaml
      - name: Build site image
        run: docker-compose -f docker-compose.yaml build peagen-com
      - name: Restart site container
        run: |
          docker-compose -f docker-compose.yaml stop peagen-com || true
          docker-compose -f docker-compose.yaml rm -f peagen-com || true
          docker rm -f peagen-com || true
          docker-compose -f docker-compose.yaml up -d --no-build --force-recreate --no-deps peagen-com
      - name: Check Nginx Proxy Manager API schema
        run: npmctl schema check || echo "NPM schema check reported limited endpoint permissions; continuing with proxy-host deploy."
      - name: Adopt matching unmanaged NPM resources
        run: npmctl adopt desired-state/proxy.yaml --owner peagen-com --force
      - name: Plan Nginx Proxy Manager host with npmctl
        run: npmctl plan desired-state/proxy.yaml --owner peagen-com
      - name: Apply Nginx Proxy Manager host with npmctl
        run: npmctl apply desired-state/proxy.yaml --owner peagen-com
